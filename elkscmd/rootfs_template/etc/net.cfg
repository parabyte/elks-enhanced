# ELKS Networking Configuration File
# sourced by /bin/net for the uip daemon and network services
# Uppercase variables may be overridden from /bootopts.

# Default IP address, gate and network mask.
# These can be IP addresses or names in /etc/hosts.
if test "$LOCALIP" != ""; then localip=$LOCALIP; else localip=192.168.1.2; fi
if test "$GATEWAY" != ""; then gateway=$GATEWAY; else gateway=192.168.1.1; fi
if test "$NETMASK" != ""; then netmask=$NETMASK; else netmask=255.255.255.0; fi

# Address mode [static|dhcp]. DHCP currently requires ethernet.
if test "$IPMODE" != ""; then ipmode=$IPMODE; else ipmode=static; fi

# Optional DNS server for static networking. Leave empty to use resolv.cfg.
if test "$DNSSERVER" != ""; then dnsserver=$DNSSERVER; else dnsserver=; fi

# Autostart the standalone esd-elks daemon when networking comes up.
if test "$ESD_ENABLE" != ""; then esd_enable=$ESD_ENABLE; else esd_enable=no; fi
if test "$ESD_PORT" != ""; then esd_port=$ESD_PORT; else esd_port=16001; fi
if test "$ESD_RATE" != ""; then esd_rate=$ESD_RATE; else esd_rate=8000; fi

# Seconds to wait for a DHCP lease before failing startup.
if test "$DHCPWAIT" != ""; then dhcpwait=$DHCPWAIT; else dhcpwait=15; fi

# Keep the default SLIP MTU aligned with the Linux sl0 peer.
if test "$MTU" != ""; then mtu=$MTU; else mtu="-m 296"; fi

# default link layer [ne0|wd0|3c0|slip|cslip]
if test "$LINK" != ""; then link=$LINK; else link=slip; fi

# default serial port and baud rate if slip/cslip
if test "$DEVICE" != ""; then device=$DEVICE; else device=/dev/ttyS0; fi
if test "$BAUD" != ""; then baud=$BAUD; else baud=115200; fi

# to use ftp/ftpd in qemu
#export QEMU=1

# daemons to start are actually shell variable command lines see below
netstart="ftpd"
#netstart="ftpd"

# specific daemon command lines, named in netstart=
telnetd="telnetd"
ftpd="ftpd"
httpd="httpd"

# custom code executed before network startup
custom_prestart_network()
{
}

# custom code executed after network startup
custom_poststart_network()
{
	if test "$esd_enable" = "yes" -a -x /bin/esd; then
		esd "$esd_port" "$esd_rate" > /tmp/esd.log 2>&1 &
	fi
}

# custom code executed after network shutdown
custom_stop_network()
{
}
