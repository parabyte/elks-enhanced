# Mount additional hard disk partitions under /mnt by device name.
# Skip boot-time fsck here: guest e2fsck does not yet scale to multi-GB ext2 volumes.
mount_hd_partition()
{
	dev=$1
	name=$2
	dir=/mnt/$name
	mkdir -p $dir || return 0
	mount $dev $dir >/dev/null 2>&1 || true
}

mount_hd_partition /dev/hda2 hda2
mount_hd_partition /dev/hda3 hda3
mount_hd_partition /dev/hda5 hda5
mount_hd_partition /dev/hda6 hda6
mount_hd_partition /dev/hda7 hda7
