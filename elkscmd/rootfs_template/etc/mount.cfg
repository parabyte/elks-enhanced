#
# /etc/mount.cfg - script to check and mount filesystems at boot
#
# check_filesystem below must be manually uncommented for MINIX
#
#set -x

fsck_for()
{
	case "$(fstype $1 /mnt)" in
	minix) echo "fsck -r" ;;
	fat) echo "fsck-dos -p" ;;
	ext2) echo "e2fsck -p" ;;
	*) echo "" ;;
	esac
}

# check a mounted filesystem
check_mounted_filesystem()
{
	fsck="$(fsck_for $1)"
	if test "$fsck" = ""; then
		echo "Unknown filesystem on $1"
		return 1
	fi
	echo -n "$fsck $1: "
	umount $1
	$fsck $1
	mount -o remount,rw $1 $2
}

# check unmounted filesystem
check_filesystem()
{
	fsck="$(fsck_for $1)"
	if test "$fsck" = ""; then
		echo "Unknown filesystem on $1"
		return 1
	fi
	echo "$fsck $1: "
	$fsck $1
}

# determine fs type
fstype()
{
	if mount -q $1 $2; then echo ""; else
		case "$?" in
		2) echo "minix" ;;
		3) echo "fat" ;;
		4) echo "ext2" ;;
		*) echo "" ;;
		esac
	umount $1 || true
	fi
}
